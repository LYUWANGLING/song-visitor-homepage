<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <rect width="1600" height="900" fill="#ffffff"/>
  <g font-family="'PingFang SC','Noto Sans SC',sans-serif" fill="#111111">
    <text x="110" y="120" font-size="34" fill="#9b8892" letter-spacing="8">小宋 / 野生眉 &amp; 雾眉设计</text>
    <text x="1220" y="158" font-size="44" fill="#ff6a50">自然感</text>
    <text x="1208" y="212" font-size="44" fill="#ff6a50">不死板</text>
    <text x="1020" y="680" font-size="28" fill="#4f89d9">眉形跟着眼神和脸型走</text>
  </g>

  <g transform="translate(108,180)">
    <rect x="0" y="0" width="560" height="520" rx="26" fill="none" stroke="#111111" stroke-width="5"/>
    <text x="34" y="56" font-size="34" fill="#d83d54">原来</text>
    <path d="M128 184 C176 156 226 156 274 180" fill="none" stroke="#111111" stroke-width="10" stroke-linecap="round"/>
    <path d="M284 182 C334 158 382 160 430 188" fill="none" stroke="#111111" stroke-width="10" stroke-linecap="round"/>
    <circle cx="214" cy="252" r="28" fill="none" stroke="#111111" stroke-width="5"/>
    <circle cx="348" cy="256" r="28" fill="none" stroke="#111111" stroke-width="5"/>
    <path d="M234 330 Q282 356 332 332" fill="none" stroke="#111111" stroke-width="5" stroke-linecap="round"/>
    <text x="70" y="410" font-size="28" fill="#d83d54">眉峰太硬</text>
    <text x="70" y="452" font-size="28" fill="#d83d54">神情容易凶</text>
    <path d="M210 404 L232 356" stroke="#d83d54" stroke-width="4" stroke-linecap="round"/>
  </g>

  <path d="M700 430 C790 430 892 430 984 430" fill="none" stroke="#ff7a2f" stroke-width="10" stroke-linecap="round"/>
  <polygon points="970,402 1020,430 970,458" fill="#ff7a2f"/>

  <g transform="translate(1000,160)">
    <rect x="0" y="0" width="490" height="560" rx="26" fill="none" stroke="#111111" stroke-width="5"/>
    <text x="34" y="56" font-size="34" fill="#d83d54">调整后</text>
    <path d="M112 186 C168 144 224 146 280 176" fill="none" stroke="#111111" stroke-width="8" stroke-linecap="round"/>
    <path d="M114 200 C170 166 224 164 278 194" fill="none" stroke="#111111" stroke-width="4" stroke-linecap="round" opacity="0.7"/>
    <path d="M286 180 C338 146 390 148 440 182" fill="none" stroke="#111111" stroke-width="8" stroke-linecap="round"/>
    <path d="M288 194 C340 168 390 168 438 198" fill="none" stroke="#111111" stroke-width="4" stroke-linecap="round" opacity="0.7"/>
    <circle cx="204" cy="252" r="28" fill="none" stroke="#111111" stroke-width="5"/>
    <circle cx="344" cy="256" r="28" fill="none" stroke="#111111" stroke-width="5"/>
    <path d="M228 336 Q276 364 324 336" fill="none" stroke="#111111" stroke-width="5" stroke-linecap="round"/>
    <text x="54" y="430" font-size="28" fill="#d83d54">线条更松</text>
    <text x="54" y="470" font-size="28" fill="#d83d54">眼神更柔和</text>
    <path d="M170 424 L182 352" stroke="#d83d54" stroke-width="4" stroke-linecap="round"/>
  </g>

  <g transform="translate(698,272)">
    <circle cx="112" cy="108" r="68" fill="#fff7f0" stroke="#111111" stroke-width="5"/>
    <path d="M44 88 C56 28 164 24 176 88 C160 56 138 46 112 46 C82 46 62 54 44 88 Z" fill="#111111"/>
    <circle cx="96" cy="106" r="7" fill="#111111"/>
    <circle cx="128" cy="106" r="7" fill="#111111"/>
    <path d="M94 142 Q112 154 130 142" fill="none" stroke="#111111" stroke-width="4" stroke-linecap="round"/>
    <path d="M92 174 L68 234" stroke="#111111" stroke-width="8" stroke-linecap="round"/>
    <path d="M132 174 L156 234" stroke="#111111" stroke-width="8" stroke-linecap="round"/>
    <path d="M42 132 L0 122" stroke="#111111" stroke-width="8" stroke-linecap="round"/>
    <path d="M180 132 L224 126" stroke="#111111" stroke-width="8" stroke-linecap="round"/>
    <text x="-40" y="110" font-size="26" fill="#4f89d9">看眼神</text>
    <text x="228" y="126" font-size="26" fill="#4f89d9">定眉形</text>
    <path d="M64 236 C80 256 146 256 162 236 L170 292 L54 292 Z" fill="#ff3f92" stroke="#111111" stroke-width="5"/>
  </g>

  <text x="110" y="792" font-size="30" fill="#111111">小宋不是只画一条眉，而是先看你整张脸，再决定更适合你的眉型方向。</text>
  <text x="110" y="842" font-size="28" fill="#9b8892">适合网页介绍里的“野生眉 / 雾眉 / 整体形象提升”</text>
</svg>
