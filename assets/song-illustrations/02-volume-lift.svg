<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <rect width="1600" height="900" fill="#ffffff"/>
  <g font-family="'PingFang SC','Noto Sans SC',sans-serif" fill="#111111">
    <text x="110" y="120" font-size="34" fill="#9b8892" letter-spacing="8">小宋 / 发缝加密 &amp; 颅顶视觉提升</text>
    <text x="1160" y="182" font-size="30" fill="#4f89d9">不是真的垫高</text>
    <text x="1160" y="222" font-size="30" fill="#4f89d9">是视觉撑起来</text>
    <text x="980" y="615" font-size="40" fill="#ff6a50">发缝没那么空</text>
  </g>

  <g transform="translate(180,190)">
    <ellipse cx="320" cy="220" rx="190" ry="165" fill="none" stroke="#111111" stroke-width="6"/>
    <path d="M150 196 C200 80 430 66 492 184" fill="none" stroke="#111111" stroke-width="10" stroke-linecap="round"/>
    <path d="M286 102 C310 242 318 364 318 540" fill="none" stroke="#d83d54" stroke-width="7" stroke-linecap="round"/>
    <text x="214" y="84" font-size="32" fill="#d83d54">发缝空</text>
    <text x="192" y="454" font-size="32" fill="#d83d54">颅顶扁</text>
    <path d="M248 94 L284 116" stroke="#d83d54" stroke-width="4" stroke-linecap="round"/>
  </g>

  <path d="M680 430 C760 332 924 292 1084 318" fill="none" stroke="#ff7a2f" stroke-width="10" stroke-linecap="round"/>
  <polygon points="1070,290 1122,326 1060,348" fill="#ff7a2f"/>

  <g transform="translate(1140,248)">
    <ellipse cx="170" cy="220" rx="154" ry="138" fill="none" stroke="#111111" stroke-width="6"/>
    <path d="M38 208 C82 80 264 74 304 194" fill="none" stroke="#111111" stroke-width="10" stroke-linecap="round"/>
    <path d="M166 106 C182 204 184 316 182 510" fill="none" stroke="#ff7a2f" stroke-width="10" stroke-linecap="round" stroke-dasharray="8 16"/>
    <text x="224" y="82" font-size="28" fill="#d83d54">缝更细</text>
    <text x="-10" y="42" font-size="28" fill="#d83d54">头顶更蓬</text>
    <path d="M240 92 L210 122" stroke="#d83d54" stroke-width="4" stroke-linecap="round"/>
    <path d="M68 50 L112 110" stroke="#d83d54" stroke-width="4" stroke-linecap="round"/>
  </g>

  <g transform="translate(724,286)">
    <circle cx="108" cy="108" r="68" fill="#fff7f0" stroke="#111111" stroke-width="5"/>
    <path d="M50 84 C62 36 156 30 168 88 C152 62 134 56 110 56 C84 56 68 62 50 84 Z" fill="#111111"/>
    <circle cx="92" cy="106" r="7" fill="#111111"/>
    <circle cx="124" cy="106" r="7" fill="#111111"/>
    <path d="M90 144 Q108 156 126 144" fill="none" stroke="#111111" stroke-width="4" stroke-linecap="round"/>
    <path d="M86 174 L52 260" stroke="#111111" stroke-width="8" stroke-linecap="round"/>
    <path d="M132 174 L164 260" stroke="#111111" stroke-width="8" stroke-linecap="round"/>
    <path d="M52 152 L8 116" stroke="#111111" stroke-width="8" stroke-linecap="round"/>
    <path d="M164 152 L214 112" stroke="#111111" stroke-width="8" stroke-linecap="round"/>
    <path d="M208 112 L268 94" stroke="#111111" stroke-width="5" stroke-linecap="round"/>
    <path d="M10 118 L-48 134" stroke="#111111" stroke-width="5" stroke-linecap="round"/>
    <text x="-74" y="164" font-size="26" fill="#4f89d9">往中间收</text>
    <text x="274" y="100" font-size="26" fill="#4f89d9">把重心往上提</text>
    <path d="M70 244 C84 268 130 268 146 244 L160 304 L56 304 Z" fill="#ff3f92" stroke="#111111" stroke-width="5"/>
  </g>

  <text x="110" y="792" font-size="30" fill="#111111">小宋用“收发缝 + 提头顶重心”的方式，把整体轮廓撑起来。</text>
  <text x="110" y="842" font-size="28" fill="#9b8892">适合网页介绍里的“发缝加密 / 增高颅顶”</text>
</svg>
